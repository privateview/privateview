<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrivateView</title>

<style>

:root{
--bg-dark:#07070b;
--bg-dark-2:#0b0b12;
--text:#ffffff;
--muted:rgba(255,255,255,.78);

--light:#f5f7fb;
--light-2:#ffffff;
--dark-text:#0c1220;
--dark-muted:rgba(12,18,32,.72);

--blue:#2b6cff;
--shadow:0 18px 45px rgba(0,0,0,.20);
--radius:18px;
}

*{box-sizing:border-box;}
body{
margin:0;
font-family:Arial,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
background:var(--bg-dark);
color:var(--text);
}

.container{
width:min(1100px,92vw);
margin:auto;
}

/* NAVIGATION BAR */

.nav{
position:sticky;
top:0;
z-index:1000;
background:#07070b;
border-bottom:1px solid rgba(255,255,255,.08);
}

.nav-inner{
width:min(1100px,92vw);
margin:auto;
display:flex;
align-items:center;
justify-content:space-between;
padding:14px 0;
}

.nav-links{
display:flex;
gap:22px;
font-weight:600;
}

.nav-links a{
color:rgba(255,255,255,.85);
text-decoration:none;
font-size:14px;
}

.nav-links a:hover{
color:white;
}

.demo-btn{
background:#2b6cff;
color:white;
padding:8px 14px;
border-radius:8px;
text-decoration:none;
font-weight:700;
}

/* HERO SECTION */

.top{
position:relative;
min-height:25vh;
display:flex;
align-items:center;
background:
radial-gradient(900px 400px at 20% 20%, rgba(43,108,255,.18), transparent 55%),
radial-gradient(800px 450px at 80% 20%, rgba(43,108,255,.10), transparent 55%),
linear-gradient(180deg,var(--bg-dark),var(--bg-dark-2));
overflow:hidden;
}

/* FUTURE GRID */

.top::after{
content:"";
position:absolute;
inset:-200px;
background:
repeating-linear-gradient(90deg, rgba(43,108,255,.10) 0 1px, transparent 1px 40px),
repeating-linear-gradient(0deg, rgba(43,108,255,.07) 0 1px, transparent 1px 40px);
transform:rotate(8deg);
opacity:.35;
animation:gridMove 10s linear infinite;
pointer-events:none;
}

@keyframes gridMove{
from{transform:translateY(0) rotate(8deg);}
to{transform:translateY(120px) rotate(8deg);}
}

.hero{
display:flex;
flex-direction:column;
align-items:center;
text-align:center;
padding:26px 0;
gap:10px;
}

.category{
padding:8px 12px;
border-radius:999px;
border:1px solid rgba(255,255,255,.16);
background:rgba(255,255,255,.08);
font-weight:700;
font-size:13px;
}

.logo{
width:120px;
height:120px;
object-fit:contain;
box-shadow:0 0 30px rgba(43,108,255,.18);
}

.brand{
font-size:clamp(34px,4vw,54px);
font-weight:900;
}

.tagline{
color:var(--muted);
font-size:18px;
}

/* PULSING DIVIDER */

.glow-divider{
height:10px;
background:linear-gradient(90deg,transparent 0%,var(--blue) 50%,transparent 100%);
box-shadow:0 0 10px var(--blue),0 0 25px var(--blue),0 0 45px rgba(43,108,255,.7);
animation:pulseGlow 2.2s ease-in-out infinite;
}

@keyframes pulseGlow{
0%,100%{filter:brightness(1);}
50%{filter:brightness(1.4);}
}

/* WHITE SECTION */

.bottom{
background:linear-gradient(180deg,var(--light),var(--light-2));
color:var(--dark-text);
padding:40px 0 70px;
}

.section{
margin-top:30px;
}

.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
}

.card,.biz-card{
background:rgba(255,255,255,.92);
border:1px solid rgba(12,18,32,.10);
border-radius:var(--radius);
padding:18px;
box-shadow:var(--shadow);
transition:.2s;
}

.card:hover,.biz-card:hover{
transform:translateY(-4px);
border-color:rgba(43,108,255,.35);
box-shadow:0 22px 55px rgba(0,0,0,.22),0 0 26px rgba(43,108,255,.18);
}
